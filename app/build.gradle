plugins {
    id 'com.android.application'
}

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.2"

    defaultConfig {
        applicationId "com.pdamkotasmg.happywork"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'com.google.android.material:material:1.1.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    testImplementation 'junit:junit:4.+'

    // library recycler view
    implementation 'com.android.support:recyclerview-v7:30.+'

    // library card view
    implementation 'com.android.support:cardview-v7:30.0.0'

    // retrofit, gson
    implementation 'com.google.code.gson:gson:2.8.5'
    implementation 'com.squareup.retrofit2:retrofit:2.5.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.5.0'

    //iamge slider
    implementation "com.android.support:support-v4:+"
    implementation 'com.squareup.picasso:picasso:2.3.2'
    implementation 'com.nineoldandroids:library:2.4.0'
    implementation 'com.daimajia.slider:library:1.1.5@aar'

    //onboarding image
    implementation 'com.github.chyrta:AndroidOnboarder:0.7'
    implementation 'com.ramotion.paperonboarding:paper-onboarding:1.1.3'

    //bounce scroll
    implementation 'com.factor:bouncy:1.5'

    // ambil gambar
    implementation 'com.github.bumptech.glide:glide:4.9.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.9.0'

    //box dialog
    implementation 'com.shreyaspatil:MaterialDialog:2.1'
    implementation 'com.google.android.material:material:1.0.0'

    //inputdialog box
    implementation 'com.afollestad.material-dialogs:core:0.9.2.3' //standard

    // Lottie Animation Library
    implementation 'com.airbnb.android:lottie:3.5.0'
    //recaptcha
    implementation 'com.google.android.gms:play-services-safetynet:17.0.0'

    //get lat long, address
    implementation 'com.github.delight-im:Android-SimpleLocation:v1.1.0'

    //mock location

    // permission for android
    implementation 'pub.devrel:easypermissions:2.0.1'

    //smartTab Lyout
    implementation 'com.ogaclejapan.smarttablayout:library:2.0.0@aar'
    implementation 'com.ogaclejapan.smarttablayout:utils-v4:2.0.0@aar'

    //camera
    api 'com.otaliastudios:cameraview:2.7.0'

    implementation 'com.camerakit:camerakit:1.0.0-beta3.11'
    implementation 'com.camerakit:jpegkit:0.1.0'
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.3.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.0.0'

    //spinner
    implementation 'com.jaredrummler:material-spinner:1.3.1'

    //circle image
    implementation 'de.hdodenhof:circleimageview:3.1.0'

    //getTimeGlobal
    implementation 'com.github.kk121:SecureTimer:v1.0'

    //get Device Info
    implementation 'com.an.deviceinfo:deviceinfo:0.1.5'

    // splash screen animation
//    implementation 'com.github.ChilliBits:splash-screen:1.1.6'
    implementation 'com.daimajia.androidanimations:library:2.3@aar'


    androidTestImplementation 'androidx.test.ext:junit:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'
}